name: Deploy versioned builds to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Assemble deploy tree (each ruffled* at its own path; default copied to root)
        env:
          # Which version is served at the root URL. Change this one variable
          # to switch the default; everything else updates automatically.
          DEFAULT_VERSION: ruffled1
        run: |
          mkdir -p _deploy
          # Each versioned build gets its own namespaced path
          for v in ruffled*/; do
            name="${v%/}"
            cp -R "$v" "_deploy/$name"
          done
          # Mount the chosen default at the root as well (no symlinks: Pages
          # serves files literally and we want each version's relative paths
          # to resolve identically at /<name>/ and at /).
          cp -R "$DEFAULT_VERSION/." _deploy/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_deploy
      - id: deployment
        uses: actions/deploy-pages@v4
